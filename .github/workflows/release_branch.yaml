name: branch creation

on:
  workflow_call:
  repository_dispatch:

jobs:

  create_branches:
    name: Create Branches
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          PATH="$PATH:/github/home/.local/bin"

      - name: Copy scripts
        run: |
          cp ./dummy-pipeline/release/release_create.go .

      - name: Build release_create.go
        run: go build -o release_create release_create.go

      - name: Create release branch
        run: ./release_create ${{ steps.increment_tag.outputs.new_tag }}